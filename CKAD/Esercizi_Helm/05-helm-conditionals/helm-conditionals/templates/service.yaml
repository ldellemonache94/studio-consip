apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-conditionals.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-conditionals.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "helm-conditionals.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
