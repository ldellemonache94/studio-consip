apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-reader-binding
  namespace: ckad-rbac
subjects:
  # Associa il Role al ServiceAccount app-reader
- kind: ServiceAccount
  name: app-reader
  namespace: ckad-rbac
roleRef:
  # Riferimento al Role definito sopra
  kind: Role
  name: pod-configmap-reader
  apiGroup: rbac.authorization.k8s.io