apiVersion: v1
kind: Pod
metadata:
  # Nome univoco per il pod di test
  name: {{ include "helm-advanced.fullname" . }}-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-advanced.labels" . | nindent 4 }}
  annotations:
    # Questa annotazione dice a Helm: "esegui questo Pod quando viene chiamato helm test"
    "helm.sh/hook": test
    # Cancella il pod dopo che il test è passato
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  containers:
  - name: wget
    image: busybox:1.36
    # Fa una richiesta HTTP al Service e verifica che risponda
    command:
      - wget
      - "-O-"
      - "-T"
      - "5"
      - "http://{{ include "helm-advanced.fullname" . }}:{{ .Values.service.port }}/"
  # OnFailure: se il test fallisce, il pod non viene riavviato (risultato conservato)
  restartPolicy: Never
