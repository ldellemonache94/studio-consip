replicaCount: 2

image:
  repository: nginx
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 80
  type: ClusterIP

# Env vars dinamiche: aggiunte al container via range
envVars:
  - name: ENV
    value: "development"
  - name: LOG_LEVEL
    value: "info"

# Annotazioni custom: iterate via range su mappa
annotations:
  team: devops
  project: ckad-training

# Ingress opzionale: generato SOLO se enabled=true
ingress:
  enabled: false
  host: myapp.local
  path: /
  pathType: Prefix

# HPA opzionale: generato SOLO se enabled=true
# Se abilitato, il Deployment non setta replicas (gestito dall'HPA)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
