# L'intero file viene saltato se ingress.enabled = false
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "helm-conditionals.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-conditionals.labels" . | nindent 4 }}
spec:
  rules:
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: {{ .Values.ingress.path }}
        pathType: {{ .Values.ingress.pathType }}
        backend:
          service:
            name: {{ include "helm-conditionals.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
