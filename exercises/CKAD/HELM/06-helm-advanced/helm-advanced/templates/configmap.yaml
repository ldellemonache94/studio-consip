apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm-advanced.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-advanced.labels" . | nindent 4 }}
data:
  APP_MESSAGE: {{ .Values.config.appMessage | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
