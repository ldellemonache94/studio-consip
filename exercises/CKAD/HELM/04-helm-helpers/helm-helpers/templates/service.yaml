apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-helpers.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-helpers.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    # Il selector del Service usa selectorLabels per matchare i Pod
    {{- include "helm-helpers.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
